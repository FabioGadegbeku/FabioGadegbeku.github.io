# Setup
plugins:
  - jekyll-remote-theme

remote_theme: vszhub/not-pure-poole
title: Fabio's Github Page
description: M1 Data Science student based in France
url: https://FabioGadegbeku.github.io
avatar: /Fabiocv.jpg
paginate: 5
permalink: pretty
cover_image: /bg2.jpeg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: Elon
  card: summary
logo: logo.png
social:
  name: Fabio
  links:
    - https://twitter.com
    - https://github.com/FabioGadegbeku
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Fabio
  url: https://github.com/FabioGadegbeku
  email: fabio.gadegbeku.etu@univ-lille.fr